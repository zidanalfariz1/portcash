name: Update Market Prices

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Call update-prices endpoint
        run: |
          curl -f -X GET "${{ secrets.APP_URL }}/api/cron/update-prices" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"